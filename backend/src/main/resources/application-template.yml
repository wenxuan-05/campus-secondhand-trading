server:
  port: 8080

spring:
  application:
    name: campus-secondhand

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=campus_secondhand;encrypt=false;trustServerCertificate=true
    username: sa
    password: YOUR_SQLSERVER_PASSWORD
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  data:
    redis:
      host: localhost
      port: 6379
      password: YOUR_REDIS_PASSWORD
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: YOUR_BASE64_ENCODED_SECRET_KEY  # 至少256位
  expiration: 604800000  # 7 days in ms

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: campus-secondhand

logging:
  level:
    com.campus.secondhand: debug
