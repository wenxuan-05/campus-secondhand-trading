server:
  port: 8080

spring:
  application:
    name: campus-trade

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=campus_trade;encrypt=true;trustServerCertificate=true
    username: sa
    password: 123456        # ← 改成你刚设置的密码
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.campustrade.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: your-256-bit-secret-key-here-must-be-at-least-32-characters-long
  expiration: 86400000
  refresh-expiration: 604800000